<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주사피부염 셀프 진단 | 닥터나우</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #FD7E14;
      --bg-dark: #1C1C1E;
      --bg-card: #2C2C2E;
      --white: #FFFFFF;
      --sub: rgba(255,255,255,0.55);
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Noto Sans KR', sans-serif;
      background: #111;
      display: flex; align-items: center; justify-content: center;
    }
    .device {
      width: 100%; max-width: 390px;
      height: 100dvh; max-height: 844px;
      background: var(--bg-dark);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* NAV BAR */
    .nav-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 20px 20px 14px; flex-shrink: 0; z-index: 10;
    }
    .nav-back {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 22px; cursor: pointer; flex-shrink: 0;
    }
    .nav-title { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: -0.3px; }

    /* PROGRESS */
    .prog-wrap { padding: 0 24px 4px; flex-shrink: 0; }
    .prog-track { height: 4px; background: rgba(255,255,255,0.1); border-radius: 99px; overflow: hidden; }
    .prog-fill { height: 100%; background: var(--primary); border-radius: 99px; transition: width .45s cubic-bezier(.4,0,.2,1); }

    /* SCREENS */
    .screen { display: none; flex: 1; flex-direction: column; overflow-y: auto; overflow-x: hidden; }
    .screen.active { display: flex; animation: sIn .32s cubic-bezier(.4,0,.2,1) both; }
    @keyframes sIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }

    /* INTRO */
    #screen-intro { background: var(--bg-dark); }
    .intro-body { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 28px; }
    .intro-title { font-size: 28px; font-weight: 900; color: #fff; line-height: 1.38; letter-spacing: -0.8px; margin-bottom: 26px; }
    .intro-desc { font-size: 15px; color: var(--sub); line-height: 1.9; letter-spacing: -0.2px; }

    /* QUESTION */
    #screen-question { background: var(--bg-dark); }
    .q-body { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 28px; }
    .q-title { font-size: 26px; font-weight: 900; color: #fff; line-height: 1.42; letter-spacing: -0.7px; margin-bottom: 22px; white-space: pre-line; }
    .q-desc  { font-size: 14px; color: var(--sub); line-height: 1.9; letter-spacing: -0.2px; white-space: pre-line; }
    .btn-row { display: flex; gap: 12px; padding: 0 28px 40px; flex-shrink: 0; }
    .btn-no, .btn-yes {
      flex: 1; padding: 20px 0; border: none; border-radius: var(--radius);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 18px; font-weight: 700; cursor: pointer;
      transition: transform .12s, opacity .12s; letter-spacing: -0.3px;
    }
    .btn-no  { background: rgba(255,255,255,0.12); color: #fff; }
    .btn-yes { background: var(--primary); color: #fff; }
    .btn-no:active, .btn-yes:active { transform: scale(.96); opacity: .8; }

    /* START BUTTON */
    .btn-full {
      width: 100%; padding: 20px; border: none;
      background: var(--primary); color: #fff;
      border-radius: var(--radius);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 18px; font-weight: 700; cursor: pointer;
      letter-spacing: -0.3px; flex-shrink: 0;
      transition: transform .12s, opacity .12s;
    }
    .btn-full:active { transform: scale(.97); opacity: .88; }

    /* RESULT BG */
    #screen-result { overflow-y: auto; }
    .res-bg-0 { background: linear-gradient(160deg, #42B4F5 0%, #2196E0 100%); }
    .res-bg-1 { background: linear-gradient(160deg, #9B79E8 0%, #7B5CE0 100%); }
    .res-bg-2 { background: linear-gradient(160deg, #3DBD82 0%, #1E9E65 100%); }
    .res-bg-3 { background: linear-gradient(160deg, #F97BBF 0%, #E8539A 100%); }

    /* RESULT TOP */
    .res-top {
      display: block;
      padding: 20px 28px 0;
      text-align: left;
    }
    #res-percent {
      font-size: 28px; font-weight: 900; color: #fff;
      letter-spacing: -1px; line-height: 1.2; margin-bottom: 8px;
    }
    #res-subtitle {
      font-size: 15px; font-weight: 800; color: #ffffff;
      line-height: 1.5; letter-spacing: -0.3px;
    }

    /* CHARACTER */
    .char-wrap {
      display: flex; justify-content: center;
      padding: 16px 0 0;
    }
    .char-bubble {
      width: 140px; height: 140px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 76px; position: relative;
    }
    .char-bubble::before {
      content: '';
      position: absolute; inset: -6px; border-radius: 50%;
      border: 2px dashed rgba(255,255,255,0.3);
      animation: spin 14s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* WHITE CARD */
    .res-card-body {
      background: #fff; border-radius: 28px 28px 0 0;
      padding: 22px 24px 0; flex: 1;
    }
    .res-body-text {
      font-size: 17px; font-weight: 800; color: #fff;
      line-height: 1.65; letter-spacing: -0.4px;
      text-align: center; white-space: pre-line;
      padding: 16px 28px 28px;
    }
    .res-body-sub {
      font-size: 13px; color: #6B7280;
      line-height: 1.75; letter-spacing: -0.2px;
      text-align: center; margin-bottom: 18px; white-space: pre-line;
      padding-top: 4px;
    }

    /* HASHTAGS */
    .hashtag-list {
      display: flex; flex-direction: row; flex-wrap: wrap; justify-content: center;
      gap: 8px; margin-bottom: 16px;
    }
    .hashtag {
      display: inline-flex; align-items: center; gap: 6px;
      background: #F3F4F6; border-radius: 99px;
      padding: 8px 16px;
      font-size: 13px; font-weight: 700; color: #374151;
      letter-spacing: -0.2px;
    }

    /* SYMPTOM SUMMARY */
    .symptom-summary {
      background: #F9FAFB; border-radius: 16px;
      padding: 14px 18px; margin-bottom: 14px;
    }
    .symptom-summary-title {
      font-size: 12px; font-weight: 700; color: #6B7280;
      letter-spacing: 0.3px; text-transform: uppercase; margin-bottom: 10px;
    }
    .symptom-summary-empty {
      font-size: 14px; color: #9CA3AF; text-align: center; padding: 8px 0;
    }
    .keyword-wrap {
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .keyword-tag {
      background: #fff; border: 1.5px solid #FD7E14;
      border-radius: 99px; padding: 6px 14px;
      font-size: 13px; font-weight: 700; color: #FD7E14;
      letter-spacing: -0.2px;
    }
    .keyword-tag.required {
      background: #FD7E14; color: #fff; border-color: #FD7E14;
    }

    /* COPY BUTTON */
    .btn-copy {
      width: 100%; padding: 14px; border: 1.5px solid #E5E7EB;
      background: #fff; color: #374151;
      border-radius: var(--radius);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px; font-weight: 600; cursor: pointer;
      letter-spacing: -0.2px; margin-bottom: 20px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: background .15s, color .15s, border-color .15s;
    }
    .btn-copy.copied { background: #ECFDF5; border-color: #6EE7B7; color: #059669; }

    /* CTA + SHARE + RETRY */
    .res-cta-wrap { padding: 0 0 16px; }
    .btn-cta {
      width: 100%; padding: 20px; border: none;
      background: var(--primary); color: #fff;
      border-radius: var(--radius);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 17px; font-weight: 800; cursor: pointer;
      letter-spacing: -0.3px; margin-bottom: 10px;
      transition: transform .12s, opacity .12s;
    }
    .btn-cta:active { transform: scale(.97); opacity: .88; }
    .btn-share {
      width: 100%; padding: 16px; border: none;
      background: #F3F4F6; color: #374151;
      border-radius: var(--radius);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 15px; font-weight: 700; cursor: pointer;
      letter-spacing: -0.3px; margin-bottom: 10px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .12s;
    }
    .btn-share:active { background: #E5E7EB; }
    .btn-retry {
      width: 100%; padding: 12px; border: none;
      background: transparent; color: #9CA3AF;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px; font-weight: 500; cursor: pointer;
      letter-spacing: -0.2px;
    }
    .share-toast {
      display: none; text-align: center;
      font-size: 13px; color: #059669; font-weight: 600;
      padding: 8px 0 4px;
    }
    .disclaimer {
      font-size: 11px; color: #D1D5DB;
      line-height: 1.7; text-align: center; padding-bottom: 28px;
    }
  </style>
</head>
<body>
<div class="device">

  <!-- NAV BAR -->
  <div class="nav-bar">
    <div class="nav-back" onclick="goBack()">&#8249;</div>

    </div>
    <div style="padding:0 28px 40px;flex-shrink:0;">
      <button class="btn-full" onclick="startQuiz()">시작하기</button>
    </div>
  </div>

  <!-- QUESTION -->
  <div class="screen" id="screen-question">

  <!-- RESULT -->
  <div class="screen" id="screen-result">
    <div id="res-top-area">
      <div class="res-top">
        <div id="res-percent"></div>
        <div id="res-subtitle"></div>
      </div>
      <div class="char-wrap">
        <div class="char-bubble" id="char-bubble"></div>
      </div>
      <div class="res-body-text" id="res-body-text"></div>
      <div class="hashtag-list"  id="hashtag-list"></div>
    </div>
    <div class="res-card-body">
      <div class="res-body-sub" id="res-body-sub"></div>
      <div class="symptom-summary">
        <div class="symptom-summary-title">✅ 내가 선택한 증상</div>
        <div id="symptom-list"></div>
      </div>
      <button class="btn-copy" id="btn-copy" onclick="copySymptoms()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>

      </button>
      <div class="res-cta-wrap">
        <button class="btn-cta" onclick="goToDoctor()">주사피부염 진료 바로가기</button>
        <button class="btn-share" onclick="shareResult()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          친구에게 공유하기
        </button>
        <div id="share-toast" class="share-toast">🔗 링크가 클립보드에 복사됐어요!</div>
        <button class="btn-retry" onclick="retakeQuiz()">&#8635; 다시 진단하기</button>
      </div>
      <p class="disclaimer">본 결과는 의학적 진단이 아니며 참고용으로만 활용해 주세요.<br>정확한 진단은 전문의와 상담하시기 바랍니다.</p>
    </div>
  </div>

</div><!-- /device -->

    hashtags: ["#주사피부염", "#모낭염아니고모낭충"],

var TOTAL = questions.length;
var currentQ = 0;
var yesCount = 0;
var answering = false;
var yesAnswers = [];
var q1Answer = false; // Q1(홍조) 선택 여부

function startQuiz() {
  currentQ = 0;
  yesCount = 0;
  yesAnswers = [];
  q1Answer = false;
  document.getElementById("nav-title").textContent = "닥터나우 주사피부염 셀프 테스트";
  document.getElementById("prog-wrap").style.display = "block";
  showScreen("screen-question");
  renderQ();
}

function renderQ() {
  var q = questions[currentQ];
  document.getElementById("q-title").textContent = q.title;
  document.getElementById("q-desc").textContent = q.desc;
  document.getElementById("prog-fill").style.width = (currentQ / TOTAL * 100) + "%";
  var el = document.getElementById("screen-question");
  el.style.animation = "none";
  void el.offsetWidth;
  el.style.animation = "";
}

function answer(isYes) {
  if (answering) return;
  answering = true;
  if (currentQ === 0) {
    q1Answer = isYes; // Q1 홍조 여부 별도 저장
  }
  if (isYes) {
    yesCount++;
    if (currentQ > 0) yesAnswers.push(currentQ); // Q2~Q8만 증상 목록에 추가
  }
  currentQ++;
  if (currentQ < TOTAL) {
    renderQ();
    setTimeout(function() { answering = false; }, 350);
  } else {
    document.getElementById("prog-fill").style.width = "100%";
    setTimeout(function() { showResult(); answering = false; }, 350);
  }
}

function showResult() {
  document.getElementById("prog-wrap").style.display = "none";
  document.getElementById("nav-title").textContent = "닥터나우 주사피부염 진단 결과";

  // Q1(홍조) 여부 + Q2~Q8 선택 수로 레벨 결정
  var otherCount = q1Answer ? yesCount - 1 : yesCount; // Q1 네이면 1 빼기
  var lvl;
  if (q1Answer) {
    lvl = otherCount >= 2 ? 3 : 2; // 홍조O: 2개이상→매우높음, 1개이하→높음
  } else {
    lvl = otherCount >= 2 ? 1 : 0; // 홍조X: 2개이상→낮음, 1개이하→매우낮음
  }
  var r = RESULTS[lvl];

  var resultScreen = document.getElementById("screen-result");
  resultScreen.className = "screen " + r.bgClass;

  document.getElementById("res-percent").textContent = r.label;
  document.getElementById("res-subtitle").textContent = r.subtitle;
  document.getElementById("char-bubble").textContent = r.char;
  document.getElementById("res-body-text").textContent = r.bodyText;
  document.getElementById("res-body-sub").textContent = r.bodySub;

  var hl = document.getElementById("hashtag-list");
  hl.innerHTML = "";
  for (var i = 0; i < r.hashtags.length; i++) {
    var div = document.createElement("div");
    div.className = "hashtag";
    div.textContent = r.hashtags[i];
    hl.appendChild(div);
  }

  var sl = document.getElementById("symptom-list");
  sl.innerHTML = "";
  var showRosacea = (lvl === 2 || lvl === 3);
  if (yesAnswers.length === 0 && !showRosacea) {
    var empty = document.createElement("div");
    empty.className = "symptom-summary-empty";
    empty.textContent = "선택한 증상이 없어요 🙂";
    sl.appendChild(empty);
  } else {
    var wrap = document.createElement("div");
    wrap.className = "keyword-wrap";
    if (showRosacea) {
      var req1 = document.createElement("span");
      req1.className = "keyword-tag required";
      req1.textContent = "#홍조";
      wrap.appendChild(req1);
      var req2 = document.createElement("span");
      req2.className = "keyword-tag required";
      req2.textContent = "#주사피부염";
      wrap.appendChild(req2);
    }
    for (var j = 0; j < yesAnswers.length; j++) {
      var tag = document.createElement("span");
      tag.className = "keyword-tag";
      tag.textContent = questions[yesAnswers[j]].keyword;
      wrap.appendChild(tag);
    }
    sl.appendChild(wrap);
  }

  var btn = document.getElementById("btn-copy");
  btn.className = "btn-copy";
  btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> 증상 텍스트 복사하기';

  document.getElementById("share-toast").style.display = "none";

  showScreen("screen-result");
}

function showScreen(id) {
  var screens = document.querySelectorAll(".screen");
  for (var i = 0; i < screens.length; i++) {
    screens[i].classList.remove("active");
  }
  document.getElementById(id).classList.add("active");
}

function goBack() {
  var active = document.querySelector(".screen.active").id;
  if (active === "screen-question") {
    if (currentQ > 0) { currentQ--; }
    if (currentQ === 0) {
      document.getElementById("prog-wrap").style.display = "none";
      document.getElementById("nav-title").textContent = "닥터나우 주사피부염 자가 진단";
      showScreen("screen-intro");
    } else {
      renderQ();
    }
  } else if (active === "screen-result") {
    retakeQuiz();
  }
}

function goToDoctor() {
  window.location.href = "doctornow://doctors?specialty=dermatology&disease=rosacea";
}

function retakeQuiz() {
  currentQ = 0;
  yesCount = 0;
  yesAnswers = [];
  q1Answer = false;
  document.getElementById("screen-result").className = "screen";
  document.getElementById("nav-title").textContent = "닥터나우 주사피부염 자가 진단";
  showScreen("screen-intro");
}

function copyToClipboard(text, onSuccess, onFail) {
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(onSuccess).catch(function() {
      execCommandCopy(text, onSuccess, onFail);
    });
  } else {
    execCommandCopy(text, onSuccess, onFail);
  }
}

function execCommandCopy(text, onSuccess, onFail) {
  try {
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.setAttribute("readonly", "");
    ta.style.cssText = "position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    ta.setSelectionRange(0, 999999);
    var ok = document.execCommand("copy");
    document.body.removeChild(ta);
    if (ok) { onSuccess(); } else { onFail(); }
  } catch(e) {
    onFail();
  }
}

function copySymptoms() {
  var lvl = yesCount >= 3 ? 3 : yesCount;
  var label = RESULTS[lvl].label;
  var text = "";
  var showRosacea = (lvl === 2 || lvl === 3);
  if (showRosacea) text += "#홍조 #주사피부염";
  for (var i = 0; i < yesAnswers.length; i++) {
    if (text.length > 0) text += " ";
    text += questions[yesAnswers[i]].keyword;
  }
  if (text.length === 0) text = "선택한 증상 없음";

  var btn = document.getElementById("btn-copy");
  copyToClipboard(text,
    function() {
      btn.className = "btn-copy copied";
      btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> 복사 완료!';
      setTimeout(function() {
        btn.className = "btn-copy";
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> 증상 텍스트 복사하기';
      }, 2500);
    },
    function() {
      btn.textContent = "⚠️ 복사 실패 · 직접 선택해 주세요";
      setTimeout(function() {
        btn.className = "btn-copy";
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> 증상 텍스트 복사하기';
      }, 3000);
    }
  );
}

function fallbackShare(url) {
  copyToClipboard(url,
    function() {
      var toast = document.getElementById("share-toast");
      toast.style.display = "block";
      setTimeout(function() { toast.style.display = "none"; }, 3000);
    },
    function() { alert("공유 URL: " + url); }
  );
}

function shareResult() {
  var otherCount = q1Answer ? yesCount - 1 : yesCount;
  var lvl = q1Answer ? (otherCount >= 2 ? 3 : 2) : (otherCount >= 2 ? 1 : 0);
  var label = RESULTS[lvl].label;
  var shareUrl = window.location.href;
  var shareMsg = "나 주사피부염 셀프 진단해봤는데 " + label + "가 나왔어! 너도 해봐 👀";

  if (navigator.share) {
    navigator.share({ url: shareUrl }).catch(function(err) {
      if (!err || err.name !== "AbortError") { fallbackShare(shareUrl); }
    });
  } else {
    fallbackShare(shareUrl);
  }
}
</script>
